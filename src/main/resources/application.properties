# ─── Server ────────────────────────────────────────────────
server.port=8080

# ─── H2 In-Memory Database (development) ──────────────────
spring.datasource.url=jdbc:h2:mem:daygenie;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ─── MySQL (uncomment + comment H2 section for production) ─
# spring.datasource.url=jdbc:mysql://localhost:3306/daygenie?useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─── External APIs ─────────────────────────────────────────
# Get a free key at https://openweathermap.org/api
daygenie.weather.api.key=YOUR_OPENWEATHERMAP_API_KEY
daygenie.weather.api.url=https://api.openweathermap.org/data/2.5/forecast

# Get a free key at https://developers.google.com/maps
daygenie.maps.api.key=YOUR_GOOGLE_MAPS_API_KEY
daygenie.maps.distance.url=https://maps.googleapis.com/maps/api/distancematrix/json

# ─── JWT ────────────────────────────────────────────────────
daygenie.jwt.secret=DayGenieSecretKey2025ChangeInProduction
daygenie.jwt.expiration=86400000

# ─── Logging ────────────────────────────────────────────────
logging.level.com.daygenie=DEBUG
