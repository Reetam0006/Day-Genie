<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Day-Genie — Dashboard</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
</head>
<body>

<!-- ══════════════ APP SCREEN ══════════════ -->
<div id="app-screen">

  <!-- Top bar -->
  <div class="topbar">
    <div class="logo">Day-Genie </div>
    <div class="user-chip">
      <div class="avatar" id="avatar-initials">U</div>
      <span id="topbar-username" style="font-size:.9rem"></span>
      <button class="btn-sm btn-logout" onclick="Controller.logout()">Logout</button>
    </div>
  </div>

  <div class="main">

    <!-- NLP input -->
    <div class="nlp-card">
      <h2>✨ Add task with natural language</h2>
      <div class="nlp-row">
        <input id="nlp-input" type="text"
               placeholder="Go to college on Sunday at 9 AM  |  Doctor appointment tomorrow at 3 PM near Park Street"/>
        <button onclick="Controller.createFromNlp()">➕ Add</button>
      </div>
      <div class="hint">Tip: mention a day/time and location — Day-Genie parses it automatically.</div>
    </div>

    <!-- Quick manual add -->
    <button class="add-btn" onclick="Controller.toggleQuickForm()">
      ＋ Add task manually
    </button>
    <div class="quick-form" id="quick-form">
      <div class="form-grid">
        <div class="form-group span2">
          <label>Title *</label>
          <input id="q-title" type="text" placeholder="Task title"/>
        </div>
        <div class="form-group">
          <label>Date &amp; Time *</label>
          <input id="q-time" type="datetime-local"/>
        </div>
        <div class="form-group">
          <label>Location</label>
          <input id="q-loc" type="text" placeholder="e.g. Salt Lake, Kolkata"/>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="q-cat">
            <option value="OTHER">Other</option>
            <option value="STUDY">Study</option>
            <option value="MEETING">Meeting</option>
            <option value="TRAVEL">Travel</option>
            <option value="HEALTH">Health</option>
            <option value="PERSONAL">Personal</option>
          </select>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select id="q-pri">
            <option value="MEDIUM">Medium</option>
            <option value="HIGH">High</option>
            <option value="LOW">Low</option>
          </select>
        </div>
        <div class="form-group span2">
          <label>Description</label>
          <textarea id="q-desc" rows="2" placeholder="Optional notes"></textarea>
        </div>
      </div>
      <button class="btn btn-primary" style="max-width:200px" onclick="Controller.createManual()">Save Task</button>
    </div>

    <!-- View toggle -->
    <div class="view-toggle">
      <button class="view-toggle-btn active" id="view-list-btn" onclick="Controller.switchView('list')">📋 List</button>
      <button class="view-toggle-btn" id="view-cal-btn" onclick="Controller.switchView('calendar')">📅 Calendar</button>
    </div>

    <!-- Calendar view -->
    <div id="calendar-view" style="display:none">
      <div class="calendar-card">
        <div id="calendar"></div>
        <div class="calendar-legend">
          <span class="legend-item"><span class="legend-dot legend-high"></span>High risk</span>
          <span class="legend-item"><span class="legend-dot legend-medium"></span>Medium risk</span>
          <span class="legend-item"><span class="legend-dot legend-low"></span>Low / no risk</span>
        </div>
      </div>
    </div>

    <!-- List view -->
    <div id="list-view">
    <!-- Today's tasks -->
    <div class="section-title">📅 Today's tasks</div>
    <div class="task-list" id="today-list">
      <div class="empty"><span>🌤️</span>No tasks for today</div>
    </div>

    <br/>
    <div class="section-title" style="margin-top:8px">📋 All upcoming tasks</div>
    <div class="task-list" id="all-list">
      <div class="empty"><span>📭</span>No tasks yet</div>
    </div>
    </div>

  </div>
</div>

<!-- ══════════════ TASK DETAIL MODAL ══════════════ -->
<div id="task-modal-backdrop" class="modal-backdrop" onclick="View.closeTaskModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="View.closeTaskModal()">✕</button>
    <div id="task-modal-content"></div>
  </div>
</div>

<!-- hidden auth-screen div so view.js doesn't break on logout redirect -->
<div id="auth-screen" style="display:none"></div>

<script src="js/model.js"></script>
<script src="js/view.js"></script>
<script src="js/controller.js"></script>
</body>
</html>
